<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TCGmizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 280px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fff;
        color: #222;
      }
      h1 {
        font-size: 18px;
        color: #2e9e5e;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .toggle-btn {
        display: block;
        width: 100%;
        padding: 10px 16px;
        background: #2e9e5e;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        margin-bottom: 12px;
      }
      .toggle-btn:hover {
        background: #258a50;
      }
      .toggle-btn:disabled {
        background: #ccc;
        cursor: default;
      }
      .settings-btn {
        display: block;
        width: 100%;
        padding: 8px 16px;
        background: #fff;
        color: #2e9e5e;
        border: 1px solid #2e9e5e;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        margin-bottom: 12px;
      }
      .settings-btn:hover {
        background: #f0faf4;
      }
      .status {
        font-size: 12px;
        padding: 8px;
        background: #f0faf4;
        border-radius: 6px;
        margin-bottom: 12px;
      }
      .status-label {
        color: #888;
      }
      .status-value {
        color: #1e8449;
        font-weight: 600;
      }
      .status-value.inactive {
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>⚡ TCGmizer</h1>
    <p>Mathematically optimal TCGPlayer cart optimization.</p>

    <button class="toggle-btn" id="toggle-btn" disabled>Show Optimizer</button>
    <button class="settings-btn" id="settings-btn">Settings</button>
    <button class="settings-btn" id="clear-cache-btn">Clear Seller Cache</button>
    <button class="settings-btn" id="clear-printings-cache-btn">Clear Printings Cache</button>

    <div class="status">
      <span class="status-label">Status: </span>
      <span class="status-value" id="status-text">Checking...</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
